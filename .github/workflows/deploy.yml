name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-content-update]
  schedule:
    - cron: '*/10 * * * *'

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install dependencies
        run: npm install
        working-directory: frontend
        
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          PUBLIC_SANITY_STUDIO_DATASET: production
          PUBLIC_SANITY_VISUAL_EDITING_ENABLED: false
          PUBLIC_SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL }}
          PUBLIC_FACEBOOK_URL: ${{ vars.FACEBOOK_URL }}
          PUBLIC_INSTAGRAM_URL: ${{ vars.INSTAGRAM_URL }}

      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
          
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
